# sandbox-service/config/nsjail.conf

name: "sandbox-service"

mode: ONCE
hostname: "SANDBOX"
cwd: "/workspace"

# 资源限制
time_limit: 60
rlimit_as: 128
rlimit_cpu: 60
rlimit_nofile: 64

# 命名空间隔离
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newnet: false
clone_newuts: true

# 用户映射
uidmap {
	inside_id: "0"
	outside_id: "65534"
	count: 1
}

gidmap {
	inside_id: "0"
	outside_id: "65534"
	count: 1
}

# 挂载根文件系统（只读）
mount {
	src: "/var/lib/sandbox/rootfs"
	dst: "/"
	is_bind: true
	rw: false
}

# 挂载 proc（只读）
mount {
	dst: "/proc"
	fstype: "proc"
	rw: false
}

# 挂载 tmpfs 作为 /tmp
mount {
	dst: "/tmp"
	fstype: "tmpfs"
	rw: true
}