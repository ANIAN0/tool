# sandbox-service/config/nsjail.conf

# ==================== 模式设置 ====================
mode: ONCE  # 单次执行模式

# ==================== 资源限制 ====================
# 内存限制 100MB
cgroup_mem_max: 104857600

# CPU 时间限制 (秒)
cgroup_cpu_max: 60

# 执行超时 (秒)
time_limit: 60

# 最大进程数
max_procs: 10

# ==================== 隔离设置 ====================
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newnet: false
clone_newuts: true

# ==================== 安全设置 ====================
no_new_privs: true
chroot_dir: /var/lib/sandbox/rootfs
cwd: /workspace

# ==================== 用户映射 ====================
uid_map: 0 65534 1
gid_map: 0 65534 1

# ==================== 挂载点 ====================
# 工作空间挂载：使用命令行动态挂载
# 实际挂载通过 --bindmount 参数在运行时指定